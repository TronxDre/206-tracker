<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0f0f13" />
  <title>206 Cut Tracker</title>
  <style>
    :root{--bg:#0f0f13;--card:#1a1a2e;--card2:#12121a;--line:#2a2a3e;--text:#e8e8f0;--muted:#9ca3af;--dim:#6b7280;--blue:#3b82f6;--purple:#8b5cf6;--orange:#f97316;--red:#ef4444;--green:#10b981}
    *{box-sizing:border-box} body{margin:0;background:var(--bg);color:var(--text);font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;max-width:520px;margin-inline:auto;min-height:100vh}
    button,input,textarea{font:inherit}.header{position:sticky;top:0;z-index:20;background:linear-gradient(135deg,#1a1a2e,#16213e);border-bottom:1px solid var(--line);padding:18px 16px 12px}
    .title{display:flex;gap:10px;align-items:center}.logo{width:40px;height:40px;border-radius:12px;background:linear-gradient(135deg,var(--blue),var(--purple));display:flex;align-items:center;justify-content:center;font-size:20px}
    .title h1{font-size:17px;margin:0;letter-spacing:-.3px}.title p{font-size:12px;margin:2px 0 0;color:var(--dim)}
    .progressBox{margin-top:12px;background:var(--card2);border:1px solid var(--line);border-radius:12px;padding:10px 12px}.bar{height:7px;background:var(--line);border-radius:8px;overflow:hidden}.bar span{display:block;height:100%;background:linear-gradient(90deg,var(--blue),var(--purple));width:0%}
    .row{display:flex;justify-content:space-between;gap:8px;align-items:center}.small{font-size:11px;color:var(--dim)}
    .tabs{position:sticky;top:108px;z-index:19;display:flex;gap:6px;overflow-x:auto;background:var(--bg);padding:10px 12px;border-bottom:1px solid #1e1e2a}
    .tabs button{border:0;border-radius:999px;padding:8px 13px;color:var(--muted);background:#1e1e2a;font-size:12px;font-weight:700;white-space:nowrap}.tabs button.active{color:#fff;background:linear-gradient(135deg,var(--blue),var(--purple))}
    main{padding:14px 14px 90px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.stat,.card{background:var(--card);border:1px solid var(--line);border-radius:15px;padding:14px}.stat .big{font-weight:900;font-size:24px;line-height:1}.stat .label{font-size:11px;color:var(--dim);margin-top:5px}.sectionTitle{font-size:14px;font-weight:800;margin:18px 2px 10px}
    details{background:var(--card);border:1px solid var(--line);border-radius:15px;margin-bottom:9px;overflow:hidden}details[open]{border-color:#3b82f666}summary{list-style:none;cursor:pointer;padding:14px;display:flex;align-items:center;gap:10px}summary::-webkit-details-marker{display:none}
    .badge{font-size:9px;font-weight:900;letter-spacing:.8px;padding:4px 7px;border-radius:99px}.icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}.sumText{flex:1;min-width:0}.sumText b{display:block;font-size:13px}.sumText span{display:block;font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.chev{color:var(--dim)}
    .detailBody{border-top:1px solid var(--line);padding:12px 14px 14px}.exercise{display:grid;grid-template-columns:28px 1fr auto;gap:10px;align-items:center;padding:10px 11px;background:var(--card2);border-radius:11px;margin-bottom:7px}.num{width:24px;height:24px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:900}.exercise b{font-size:12px}.exercise p{font-size:10px;color:var(--dim);margin:2px 0 0}.sets{font-size:11px;font-weight:900}
    .logline{display:grid;grid-template-columns:1fr 1fr 1fr auto;gap:6px;margin-top:7px}input,textarea{width:100%;background:#0d0d14;border:1px solid var(--line);border-radius:10px;color:var(--text);padding:10px;font-size:13px}.miniBtn{border:0;background:#22233a;color:var(--text);padding:9px 10px;border-radius:10px;font-size:12px;font-weight:800}.primary{background:linear-gradient(135deg,var(--blue),var(--purple));color:white;border:0;border-radius:12px;padding:12px 14px;font-weight:900;width:100%}.danger{background:#3a1a1a;color:#fecaca;border:1px solid #5a2222}
    .timer{background:#08080c;border:1px solid var(--line);border-radius:18px;padding:18px;text-align:center}.time{font-size:52px;font-weight:950;letter-spacing:-2px}.timerBtns{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:12px}.timerBtns button{border:0;border-radius:12px;padding:12px 6px;font-weight:900;background:#1e1e2a;color:var(--text)}.timerBtns .go{background:var(--green);color:#04130d}.timerBtns .stop{background:var(--red);color:#fff}.quick{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:10px}.quick button{border:1px solid var(--line);border-radius:12px;background:var(--card);color:var(--text);padding:10px 4px;font-size:12px;font-weight:900}
    .bottomNav{position:fixed;left:50%;transform:translateX(-50%);bottom:0;z-index:30;max-width:520px;width:100%;background:#0b0b10ee;backdrop-filter:blur(10px);border-top:1px solid var(--line);display:grid;grid-template-columns:repeat(4,1fr);padding:8px 8px calc(8px + env(safe-area-inset-bottom))}.bottomNav button{border:0;background:transparent;color:var(--dim);font-size:11px;font-weight:800;padding:8px 2px;border-radius:12px}.bottomNav button.active{background:#1e1e2a;color:var(--text)}
    .pill{display:inline-block;border-radius:999px;padding:4px 8px;font-size:10px;font-weight:900;margin:3px 3px 0 0;background:#1e1e2a;color:var(--muted)}.note{font-size:12px;color:var(--muted);line-height:1.5}.toast{position:fixed;bottom:78px;left:50%;transform:translateX(-50%);background:#111827;color:white;border:1px solid #374151;border-radius:999px;padding:10px 14px;font-size:12px;font-weight:800;opacity:0;pointer-events:none;transition:.25s;z-index:60}.toast.show{opacity:1}
  </style>
</head>
<body>
  <div class="header"><div class="title"><div class="logo">🎯</div><div><h1>206 Cut Tracker</h1><p>229.2 → 206 lb · Locked through Aug 27</p></div></div><div class="progressBox"><div class="row small"><span id="currentWeightLabel">229.2 lb now</span><span style="color:var(--blue);font-weight:800">Goal: 206 lb</span></div><div class="bar" style="margin:7px 0"><span id="weightBar"></span></div><div class="row small"><span id="remainingLabel" style="color:var(--orange);font-weight:800">23.2 lb to lose</span><span>~2.1 lb/week</span></div></div></div>
  <div class="tabs" id="tabs"><button class="active" data-view="dashboard">📊 Overview</button><button data-view="workouts">💪 Workouts</button><button data-view="timer">⏱ Timer</button><button data-view="checkin">📝 Check-In</button><button data-view="nutrition">🥗 Nutrition</button><button data-view="settings">⚙️ Settings</button></div>
  <main><section id="dashboard" class="view"></section><section id="workouts" class="view" style="display:none"></section><section id="timer" class="view" style="display:none"></section><section id="checkin" class="view" style="display:none"></section><section id="nutrition" class="view" style="display:none"></section><section id="settings" class="view" style="display:none"></section></main>
  <div class="bottomNav" id="bottomNav"><button class="active" data-view="dashboard">📊<br>Home</button><button data-view="workouts">💪<br>Train</button><button data-view="timer">⏱<br>Timer</button><button data-view="checkin">📝<br>Log</button></div><div class="toast" id="toast">Saved</div>
<script>
const START_WEIGHT = 229.2, GOAL_WEIGHT = 206;
const colors = {upper:'#3B82F6',lower:'#10B981',cond:'#F97316',recovery:'#8B5CF6'};
const plan = [
 {day:'Monday', label:'Upper A', tag:'UPPER', color:colors.upper, focus:'Strength maintenance', exercises:[['Bench Press','3×5','Add 5 lb when all reps are complete'],['Chest-Supported DB Row','4×10','Controlled reps'],['Lat Pulldown','4×10','Full stretch'],['Seated Shoulder Press','3×10','Machine preferred'],['Rear Delt Fly','3×15',''],['Tricep Pushdown','3×12',''],['DB Curl','3×12',''],['Plank','3×60 sec','']]},
 {day:'Tuesday', label:'Lower A', tag:'HEAVY', color:colors.lower, focus:'Heavy lower body', exercises:[['Barbell Squat','3×5','Heavy day'],['Romanian Deadlift','4×8','Hips back, neutral spine'],['Leg Press','3×10','Add 10 lb when complete'],['Seated Leg Curl','3×12',''],['Standing Calf Raise','4×15',''],['Farmer Carry','3-4 trips','50-75 yards']]},
 {day:'Wednesday', label:'Conditioning A', tag:'FUNC', color:colors.cond, focus:'KB + push-ups + row/bike', exercises:[['Warm-Up Row/Bike','5 min','Easy pace'],['KB Swings','3×20','Circuit'],['Goblet Squat','3×12','Circuit'],['Push-Ups','3×15','Circuit'],['Single-Arm KB Row','3×12/side','Circuit'],['Row Intervals','8×250m','Easy 250m recovery'],['Bike Alternative','10 rounds','1 min hard / 1 min easy'],['Plank + Side Plank','3 rounds','60 sec plank, 30 sec/side']]},
 {day:'Thursday', label:'Upper B', tag:'UPPER', color:colors.upper, focus:'Upper volume', exercises:[['Incline DB Bench','4×10',''],['Seated Cable Row','4×10',''],['Lat Pulldown','3×12',''],['Machine Shoulder Press','3×10',''],['Pec Deck','3×12',''],['Rope Pushdown','3×15',''],['Hammer Curl','3×12','']]},
 {day:'Friday', label:'Lower B', tag:'VOLUME', color:colors.lower, focus:'Leg volume + endurance', exercises:[['Squat','4×8','70-75% of Tuesday'],['Leg Press','4×12',''],['Walking Lunges','3×12/leg',''],['Leg Curl','3×15',''],['Calf Raise','5×15',''],['Sled Push','6 trips','Or heavy farmer carry 4 trips']]},
 {day:'Saturday', label:'Conditioning B', tag:'FUNC', color:colors.cond, focus:'Work capacity', exercises:[['Warm-Up Row/Bike','5 min',''],['KB Complex','5 rounds','10 swings, 8 cleans, 8 front squats, 8 push presses'],['Push-Up Ladder','70 total','10, 15, 20, 15, 10'],['Functional Finisher','4 rounds','20 swings, 50 yd carry, 15 push-ups, row 250m']]},
 {day:'Sunday', label:'Recovery', tag:'RECOVER', color:colors.recovery, focus:'Walk + mobility', exercises:[['Walk','45-60 min','Easy/moderate pace'],['Mobility','10-15 min','Hip flexors, hamstrings, calves, glutes, lower back, thoracic spine']]}
];
const defaultState = {weight:229.2, water:0, calories:0, protein:0, logs:{}, checkins:[]};
let state = JSON.parse(localStorage.getItem('cutTrackerState') || 'null') || defaultState;
let timerSeconds = 90, timerLeft = 90, timerInt = null;
function save(){ localStorage.setItem('cutTrackerState', JSON.stringify(state)); toast('Saved'); updateHeader(); }
function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),1300); }
function updateHeader(){ const lost=Math.max(0,START_WEIGHT-Number(state.weight||START_WEIGHT)); const total=START_WEIGHT-GOAL_WEIGHT; const pct=Math.min(100,Math.max(0,(lost/total)*100)); document.getElementById('weightBar').style.width=pct+'%'; document.getElementById('currentWeightLabel').textContent=`${state.weight||START_WEIGHT} lb now`; document.getElementById('remainingLabel').textContent=`${Math.max(0,(Number(state.weight||START_WEIGHT)-GOAL_WEIGHT)).toFixed(1)} lb to lose`; }
function setView(view){ document.querySelectorAll('.view').forEach(v=>v.style.display='none'); document.getElementById(view).style.display='block'; document.querySelectorAll('[data-view]').forEach(b=>b.classList.toggle('active', b.dataset.view===view)); }
document.querySelectorAll('[data-view]').forEach(b=>b.onclick=()=>setView(b.dataset.view));
function renderDashboard(){ document.getElementById('dashboard').innerHTML = `<div class="grid"><div class="stat"><div class="big" style="color:var(--orange)">1900</div><div class="label">Training calories</div></div><div class="stat"><div class="big" style="color:var(--blue)">180+</div><div class="label">Protein grams</div></div><div class="stat"><div class="big" style="color:var(--green)">6</div><div class="label">Training days</div></div><div class="stat"><div class="big" style="color:var(--purple)">1 gal</div><div class="label">Water daily</div></div></div><div class="sectionTitle">Today</div><div class="card"><div class="row"><b>Current weight</b><span>${state.weight} lb</span></div><div class="row" style="margin-top:8px"><b>Water</b><span>${state.water||0} oz</span></div><div class="row" style="margin-top:8px"><b>Calories</b><span>${state.calories||0}</span></div><div class="row" style="margin-top:8px"><b>Protein</b><span>${state.protein||0}g</span></div></div><div class="sectionTitle">Priority Order</div><div class="card"><span class="pill">1. 206 lb by Aug 27</span><span class="pill">2. Lower Body</span><span class="pill">3. Functional Conditioning</span><span class="pill">4. PRT Carryover</span><span class="pill">5. Upper Strength</span><span class="pill">6. Chest</span></div><div class="sectionTitle">Weekly Structure</div>${plan.map(d=>`<div class="exercise"><div class="num" style="background:${d.color}33;color:${d.color}">${d.day[0]}</div><div><b>${d.day} - ${d.label}</b><p>${d.focus}</p></div><span class="sets" style="color:${d.color}">${d.tag}</span></div>`).join('')}`; }
function renderWorkouts(){ document.getElementById('workouts').innerHTML = `<p class="note">Tap a day, log sets if you want, and use the timer tab between sets. Revolutionary stuff, apparently.</p>${plan.map((d,i)=>`<details><summary><div class="icon" style="background:${d.color}22;color:${d.color}">${d.tag==='UPPER'?'💪':d.tag==='HEAVY'||d.tag==='VOLUME'?'🦵':d.tag==='FUNC'?'🔥':'🧘'}</div><div class="sumText"><b>${d.day} - ${d.label}</b><span>${d.focus}</span></div><span class="badge" style="background:${d.color}22;color:${d.color}">${d.tag}</span><span class="chev">▼</span></summary><div class="detailBody">${d.exercises.map((e,j)=>`<div class="exercise"><div class="num" style="background:${d.color}33;color:${d.color}">${j+1}</div><div><b>${e[0]}</b><p>${e[2]}</p></div><span class="sets" style="color:${d.color}">${e[1]}</span></div><div class="logline"><input placeholder="Weight" id="w_${i}_${j}" value="${(state.logs[`${i}_${j}`]||{}).w||''}"><input placeholder="Reps/Time" id="r_${i}_${j}" value="${(state.logs[`${i}_${j}`]||{}).r||''}"><input placeholder="Notes" id="n_${i}_${j}" value="${(state.logs[`${i}_${j}`]||{}).n||''}"><button class="miniBtn" onclick="saveExercise(${i},${j})">Save</button></div>`).join('')}</div></details>`).join('')}`; }
function saveExercise(i,j){ state.logs[`${i}_${j}`]={w:document.getElementById(`w_${i}_${j}`).value,r:document.getElementById(`r_${i}_${j}`).value,n:document.getElementById(`n_${i}_${j}`).value}; save(); }
function renderTimer(){ document.getElementById('timer').innerHTML = `<div class="timer"><div class="small">Rest Timer</div><div class="time" id="timeDisplay">${fmt(timerLeft)}</div><div class="timerBtns"><button onclick="resetTimer()">Reset</button><button class="go" onclick="startTimer()">Start</button><button class="stop" onclick="stopTimer()">Stop</button></div><div class="quick"><button onclick="setTimer(60)">60s</button><button onclick="setTimer(90)">90s</button><button onclick="setTimer(120)">2m</button><button onclick="setTimer(180)">3m</button></div></div><div class="sectionTitle">Suggested Rest</div><div class="card note">Bench/Squat/RDL: 2-3 min<br>Accessories: 60-90 sec<br>Conditioning circuits: 90 sec<br>The timer will not make the workout easier. It merely documents your suffering with precision.</div>`; }
function fmt(s){ const m=Math.floor(s/60), sec=s%60; return `${m}:${String(sec).padStart(2,'0')}`; } function setTimer(s){ timerSeconds=s; timerLeft=s; updateTimer(); } function updateTimer(){ const el=document.getElementById('timeDisplay'); if(el) el.textContent=fmt(timerLeft); } function startTimer(){ if(timerInt) return; timerInt=setInterval(()=>{ timerLeft--; updateTimer(); if(timerLeft<=0){stopTimer(); timerLeft=timerSeconds; updateTimer(); if(navigator.vibrate) navigator.vibrate([250,100,250]); toast('Rest done');}},1000);} function stopTimer(){ clearInterval(timerInt); timerInt=null; } function resetTimer(){ stopTimer(); timerLeft=timerSeconds; updateTimer(); }
function renderCheckin(){ document.getElementById('checkin').innerHTML = `<div class="card"><label class="small">Weight</label><input id="weightInput" type="number" step="0.1" value="${state.weight}"><label class="small">Water oz</label><input id="waterInput" type="number" value="${state.water||0}"><label class="small">Calories</label><input id="calInput" type="number" value="${state.calories||0}"><label class="small">Protein grams</label><input id="proInput" type="number" value="${state.protein||0}"><label class="small">Meals / Workout / Notes</label><textarea id="notesInput" rows="5" placeholder="Meals, hydration, workout, soreness, sleep..."></textarea><button class="primary" style="margin-top:10px" onclick="saveCheckin()">Save Daily Check-In</button></div><div class="sectionTitle">Recent Check-Ins</div><div id="recentCheckins"></div>`; renderRecent(); }
function saveCheckin(){ state.weight=Number(document.getElementById('weightInput').value||state.weight); state.water=Number(document.getElementById('waterInput').value||0); state.calories=Number(document.getElementById('calInput').value||0); state.protein=Number(document.getElementById('proInput').value||0); state.checkins.unshift({date:new Date().toLocaleString(), weight:state.weight, water:state.water, calories:state.calories, protein:state.protein, notes:document.getElementById('notesInput').value}); state.checkins=state.checkins.slice(0,14); save(); renderDashboard(); renderRecent(); }
function renderRecent(){ const el=document.getElementById('recentCheckins'); if(!el) return; el.innerHTML=(state.checkins||[]).map(c=>`<div class="card" style="margin-bottom:8px"><b>${c.date}</b><p class="note">${c.weight} lb · ${c.calories} cal · ${c.protein}g protein · ${c.water} oz water<br>${c.notes||''}</p></div>`).join('') || '<p class="note">No check-ins yet.</p>'; }
function renderNutrition(){ document.getElementById('nutrition').innerHTML = `<div class="grid"><div class="stat"><div class="big" style="color:var(--blue)">180-190</div><div class="label">Protein goal</div></div><div class="stat"><div class="big" style="color:var(--orange)">1900</div><div class="label">Training day</div></div><div class="stat"><div class="big" style="color:var(--green)">1700</div><div class="label">Recovery day low</div></div><div class="stat"><div class="big" style="color:var(--purple)">128</div><div class="label">Water oz</div></div></div>${[['🍳 Breakfast','2 eggs, 150g egg whites, 1 slice Dave’s Killer Bread, 20g cheese','~330 cal · ~31g protein'],['🥣 Snack','Kirkland nonfat Greek yogurt + Purely Elizabeth oats','~280 cal · ~20g protein'],['🥪 Lunch','Turkey/chicken sandwich or wrap + 250g vegetables','~500-650 cal · 45-60g protein'],['🥤 Shake','1 scoop whey with water','~120 cal · ~25g protein'],['🍗 Dinner','6-7 oz lean protein + 250g vegetables + rice/quinoa if needed','~400-650 cal · 45-60g protein']].map(x=>`<details><summary><div class="icon" style="background:#3b82f622">${x[0].split(' ')[0]}</div><div class="sumText"><b>${x[0].substring(2)}</b><span>${x[2]}</span></div><span class="chev">▼</span></summary><div class="detailBody note">${x[1]}</div></details>`).join('')}`; }
function renderSettings(){ document.getElementById('settings').innerHTML = `<div class="card note"><b>Install note</b><br>Open this file in Chrome, tap the three-dot menu, then tap <b>Add to Home screen</b> or <b>Install app</b>. If Chrome only downloads it, use a file manager to open it with Chrome.</div><div class="sectionTitle">Data</div><button class="primary" onclick="exportData()">Export Data</button><button class="primary danger" style="margin-top:10px" onclick="clearData()">Reset All Data</button>`; }
function exportData(){ const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='cut-tracker-data.json'; a.click(); }
function clearData(){ if(confirm('Reset all saved tracker data?')){localStorage.removeItem('cutTrackerState'); location.reload();}}
renderDashboard(); renderWorkouts(); renderTimer(); renderCheckin(); renderNutrition(); renderSettings(); updateHeader();
</script>
</body>
</html>
